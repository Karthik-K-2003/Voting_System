{% extends 'dashboard/user/base_user.html' %}

{% block content %}
  {% if not participants %}
    <div class="flex items-center justify-center h-[60vh]">
      <div class="bg-white p-6 rounded-lg shadow text-center">
        <p class="text-gray-500 text-lg font-medium">No Participants Available !!!</p>
      </div>
    </div>
  {% else %}
    <div class="max-w-5xl mx-auto">
      <p class="text-gray-500 mb-4">Total Candidates: {{ participants|length }}</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        {% for p in participants %}
          <div class="bg-blue-100 p-4 rounded-lg shadow-md text-center">
            <img src="{{ p.image_url }}" class="h-32 w-32 object-cover rounded-full mx-auto mb-3 border-4 border-blue-100" />
            <p class="font-semibold text-gray-800 capitalize">{{ p.name }}</p>
          </div>
        {% endfor %}
      </div>
    </div>
  {% endif %}
{% endblock %}
