<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex h-screen">
      <div class="w-64 bg-gray-800 text-white p-5">
        <h2 class="text-xl font-bold mb-6">Voting System</h2>

        <ul>
          <li class="mb-3">
            <a href="{{ url_for('participants') }}" class="block p-2 rounded {% if active_page == 'participants' %}
           bg-gray-700 font-semibold{% else %}hover:bg-gray-700{% endif %}">Participants</a>
          </li>
          <li class="mb-3">
            <a href="{{ url_for('voting') }}" class="block p-2 rounded {% if active_page == 'voting' %}
           bg-gray-700 font-semibold{% else %}hover:bg-gray-700{% endif %}">Voting</a>
          </li>
        </ul>

        <a href="/logout" class="block mt-6 bg-red-500 text-center p-2 rounded hover:bg-red-600">Logout</a>
      </div>

      <div class="flex-1 flex flex-col">
        <div class="bg-white shadow p-4 flex justify-between">
          <h1 class="font-semibold text-lg">User Dashboard</h1>
          <span class="text-gray-600">{{ email }}</span>
        </div>

        <div class="p-6">
          {% block content %}

          {% endblock %}
        </div>
      </div>
    </div>
  </body>
</html>
