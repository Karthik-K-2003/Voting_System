<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex h-screen">
      <div class="w-64 bg-gray-900 text-white p-5">
        <h2 class="text-xl font-bold mb-6">Admin Panel</h2>

        <ul>
          <li class="mb-3">
            <a href="{{ url_for('admin_dashboard') }}"
              class="block p-2 rounded
               {% if active_page == 'dashboard' %}
                
                
                   bg-gray-700 font-semibold


              {% else %}
                
                
                   hover:bg-gray-700


              {% endif %}">
              Dashboard
            </a>
          </li>

          <li class="mb-3">
            <a href="{{ url_for('add_participant') }}"
              class="block p-2 rounded
               {% if active_page == 'add_participant' %}
                
                
                   bg-gray-700 font-semibold


              {% else %}
                
                
                   hover:bg-gray-700


              {% endif %}">
              Add Participant
            </a>
          </li>

          <li class="mb-3">
            <a href="{{ url_for('voting_status') }}"
              class="block p-2 rounded
   {% if active_page == 'voting_status' %}
                
       bg-gray-700 font-semibold

              {% else %}
                
       hover:bg-gray-700

              {% endif %}">
              Voting Status
            </a>
          </li>

          <li class="mb-3">
            <a href="{{ url_for('analytics') }}"
              class="block p-2 rounded
               {% if active_page == 'analytics' %}
                
                
                   bg-gray-700 font-semibold


              {% else %}
                
                
                   hover:bg-gray-700


              {% endif %}">
              Analytics
            </a>
          </li>
        </ul>

        <a href="{{ url_for('logout') }}" class="block mt-6 bg-red-500 text-center p-2 rounded hover:bg-red-600">Logout</a>
      </div>

      <div class="flex-1 flex flex-col">
        <div class="bg-white shadow p-4 flex justify-between">
          <h1 class="font-semibold text-lg">{{ title }}</h1>
          <span class="text-gray-600">{{ email }}</span>
        </div>

        <div class="p-6 overflow-y-auto">
          {% block content %}

          {% endblock %}
        </div>
      </div>
    </div>
  </body>
</html>
